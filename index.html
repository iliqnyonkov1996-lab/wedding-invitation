<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Сватбена покана</title>

<style>

/* ОСНОВА */

body {
  margin: 0;
  height: 100vh;
  background: #f7f6f2;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: serif;
  overflow: hidden;
}


/* ПЛИК */

#envelope {
  position: relative;
  width: 340px;
  height: 220px;
  background: #eeeae0;
  border-radius: 10px;
  border: 1.5px solid #d2cec4;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  transition: opacity .8s ease;
}

body.open #envelope {
  opacity: 0;
  pointer-events: none;
}


/* КАПАК */

#flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #eeeae0;
  clip-path: polygon(0 0,100% 0,50% 55%);
  transform-origin: top;
  transition: transform 1s ease;
  z-index: 3;
}

body.open #flap {
  transform: rotateX(160deg);
}


/* ПЕЧАТ */

#seal {
  position: absolute;
  width: 80px;
  height: 80px;
  background: #7a2b2b;
  border-radius: 50%;
  top: 70px;
  left: 130px;
  color: white;
  font-size: 22px;
  border: none;
  cursor: pointer;
  z-index: 4;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.05);}
  100% {transform: scale(1);}
}


/* ПОДСКАЗКА */

#hint {
  position: absolute;
  top: 165px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  color: #6f7f6b;
  animation: fade 2.5s infinite;
}

@keyframes fade {
  0% {opacity:.3;}
  50% {opacity:.9;}
  100% {opacity:.3;}
}


/* ПОКАНА */

#invitation {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%) scale(.9);
  opacity: 0;
  transition: all 1.2s ease;
}

body.open #invitation {
  opacity: 1;
  transform: translate(-50%,-50%) scale(1);
}

#invitation img {
  width: 320px;
  max-width: 90vw;
  border-radius: 6px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
}


/* RSVP */

#rsvp {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  flex-direction: column;
  gap: 12px;
}

#rsvp a {
  text-decoration: none;
  padding: 12px 26px;
  border-radius: 30px;
  font-size: 16px;
  text-align: center;
  border: 2px solid #6f8b6b;
  color: #6f8b6b;
  background: white;
  animation: pulse 2s infinite;

}


/* ЛИСТЕНЦА */

.leaf {
  position: fixed;
  top: -20px;
  width: 10px;
  height: 14px;
  background: #6f8b6b;
  border-radius: 50% 50% 50% 0;
  transform: rotate(45deg);
  animation: fall linear forwards;
}


/* ЗЕЛЕН ПРАХ */

.spark {
  position: fixed;
  width: 5px;
  height: 5px;
  background: #6f8b6b;
  border-radius: 50%;
  top: -10px;
  opacity: .8;
  animation: fall linear forwards;
}


/* АНИМАЦИЯ */

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}

</style>
</head>


<body>


<div id="envelope">

<div id="flap"></div>

<button id="seal">С & И</button>

<div id="hint">Докосни печата</div>

</div>


<div id="invitation">
<img src="pokana.png" alt="Сватбена покана">
</div>


<div id="rsvp">

<a id="confirm" href="https://m.me/iliqn.yonkov.7" target="_blank">
Пишете ни за потвърждение
</a>

</div>


<audio id="music" src="music.mp3" muted playsinline></audio>


<script>

const seal = document.getElementById("seal")
const music = document.getElementById("music")
const rsvp = document.getElementById("rsvp")
const confirmBtn = document.querySelector("#rsvp a")

function createLeaves(){

for(let i=0;i<25;i++){

const leaf = document.createElement("div")
leaf.className="leaf"
leaf.style.left = Math.random()*100+"vw"
leaf.style.animationDuration = (4+Math.random()*4)+"s"
document.body.appendChild(leaf)
setTimeout(()=>leaf.remove(),8000)

}

}


function createSparkles(){
 for(let i=0;i<35;i++){
  const spark = document.createElement("div")
  spark.className="spark"
  spark.style.left = Math.random()*100+"vw"
  spark.style.animationDuration = (3+Math.random()*3)+"s"
  document.body.appendChild(spark)
  setTimeout(()=>spark.remove(),6000)
 }

}

function fadeOutMusic(audio, duration = 1000) {
  let volume = audio.volume;
  const step = volume / (duration / 50);

  const fade = setInterval(() => {
    volume -= step;

    if (volume <= 0) {
      audio.volume = 0;
      audio.pause();
      audio.currentTime = 0;
      clearInterval(fade);
    } else {
      audio.volume = volume;
    }
  }, 50);
}

function openInvite(){
 document.body.classList.add("open")
 music.muted=false
 music.play().catch(()=>{})

 setTimeout(()=>{
 createLeaves()
 createSparkles()
 rsvp.style.display="flex"
 },1200)

}

seal.addEventListener("click",openInvite,{once:true})

confirmBtn.addEventListener("click", (e) => {
  e.preventDefault();

  fadeOutMusic(music, 1200); // плавно затихване

  setTimeout(() => {
    window.open(confirmBtn.href, "_blank");
  }, 400)
})


</script>

</body>
</html>
